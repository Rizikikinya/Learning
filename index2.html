      crossorigin="anonymous"

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

  <body>
    <div class="links">
      <div>
        <a href="index.html">Google Search</a>
      </div>
      <div>
        <a href="index1.html">Images search</a>
      </div>
    </div>
    <form action="https://www.google.com/search" class="form">
      <h1>Aadvanced Search Google</h1>
      <div class="buttons">
        <input
          type="text"
          name="as_q"
          placeholder="all these words"
          class="inputtext"
        />

        <input
          type="text"
          name="as_epq"
          placeholder="exact phrase"
          class="inputtext"
        />

        <input
          type="text"
          name="as_oq"
          placeholder="any of these words"
          class="inputtext"
        />

        <input
          type="text"
          name="as_eq"
          placeholder="none of these words"
          class="inputtext"
        />

        <input type="submit" value="Google Search" class="textsubmit" />
      </div>
    </form>
  </body>
